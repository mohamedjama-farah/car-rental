# LOCATION: .github/workflows/maven.yml# LOCATION: .github/workflows/maven.yml
#
# V11 adds a second job: docker
# Job 1 (build): runs mvn test
# Job 2 (docker): builds and pushes Docker image to DockerHub
# Job 2 only runs if Job 1 passes

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── JOB 1: run tests ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn test

  # ── JOB 2: build and push Docker image ──────────────────────────────
  docker:
    runs-on: ubuntu-latest
    # only run if build job passed
    needs: build
    # only run on push to main, not on pull requests
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/car-rental:latest
